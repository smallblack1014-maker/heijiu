<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="黑酒 - 专业葡萄酒品鉴记录APP">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>黑酒</title>
  <base href="/heijiu/">
  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="黑酒">
  <link rel="manifest" href="manifest.json">
  <!-- PWA icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body { margin: 0; overflow: hidden; }
    #loading { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #f5f0eb; flex-direction: column;
    }
    #loading .logo { font-size: 48px; margin-bottom: 16px; }
    #loading .text { color: #722f37; font-size: 18px; font-family: system-ui, sans-serif; }
    .spinner { 
      width: 40px; height: 40px; margin-top: 24px;
      border: 3px solid #ddd; border-top-color: #722f37;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading indicator -->
  <div id="loading">
    <div class="logo">🍷</div>
    <div class="text">黑酒 · 正在加载</div>
    <div class="spinner"></div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      _flutter.loader.load({
        serviceWorkerSettings: {
          serviceWorkerVersion: '1.0.0',
        },
        onEntrypointLoaded: function(engineInitializer) {
          document.getElementById('loading').style.display = 'none';
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
